services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: syncflow-server
    restart: unless-stopped
    # The server doesn't need to expose ports to the host,
    # as it's only accessed by the client service within the Docker network.

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: syncflow-client
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - server