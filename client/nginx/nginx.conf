server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Handle client-side routing for the Single Page Application
    location / {
        try_files $uri /index.html;
    }

    # Proxy Socket.IO requests to the Node.js server
    location /socket.io/ {
        proxy_pass http://server:4001; # 'server' is the service name in docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}

